<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>北辰出海管理后台</title>
  <link rel='stylesheet' href='admin.css?v=1'>
</head>
<body>
  <div id='loadingScreen' class='loading-screen'>正在检查管理员权限</div>

  <div id='deniedScreen' class='denied-screen hidden'>
    <div class='denied-card'>
      <div class='denied-icon'>北</div>
      <h1>无法进入管理后台</h1>
      <p id='deniedMessage'>请先使用管理员账号登录前台网站。</p>
      <a class='primary-btn' href='index.html'>返回网站</a>
    </div>
  </div>

  <div id='adminApp' class='admin-shell hidden'>
    <aside class='admin-sidebar'>
      <div class='admin-brand'><span>北</span><div><strong>北辰出海</strong><small>管理后台</small></div></div>
      <nav id='adminNav'>
        <button class='nav-btn active' data-view='dashboard'>数据概览</button>
        <button class='nav-btn' data-view='products'>商品管理</button>
        <button class='nav-btn' data-view='categories'>分类管理</button>
        <button class='nav-btn' data-view='orders'>订单管理</button>
        <button class='nav-btn' data-view='recharges'>充值管理</button>
        <button class='nav-btn' data-view='users'>用户与余额</button>
      </nav>
      <div class='sidebar-footer'>
        <a href='index.html'>返回前台</a>
        <button id='adminLogout'>退出登录</button>
      </div>
    </aside>

    <main class='admin-main'>
      <header class='admin-topbar'>
        <button id='mobileMenu' class='mobile-menu'>☰</button>
        <div><h1 id='pageTitle'>数据概览</h1><p id='pageSubtitle'>网站经营数据和待处理事项</p></div>
        <div class='admin-user'><span id='adminEmail'></span><span class='admin-badge'>管理员</span></div>
      </header>

      <section id='dashboardView' class='view active'>
        <div class='stats-grid' id='statsGrid'></div>
        <div class='panel-grid'>
          <section class='panel'><div class='panel-head'><h2>最近订单</h2><button data-jump='orders'>查看全部</button></div><div id='recentOrders'></div></section>
          <section class='panel'><div class='panel-head'><h2>低库存商品</h2><button data-jump='products'>管理库存</button></div><div id='lowStockProducts'></div></section>
        </div>
      </section>

      <section id='productsView' class='view'>
        <div class='toolbar'>
          <input id='productSearch' placeholder='搜索商品名称或简介'>
          <select id='productCategoryFilter'><option value=''>全部分类</option></select>
          <button class='primary-btn' id='addProductBtn'>新增商品</button>
        </div>
        <div class='table-card'><div class='table-wrap'><table><thead><tr><th>商品</th><th>分类</th><th>价格</th><th>库存</th><th>状态</th><th>操作</th></tr></thead><tbody id='productsTable'></tbody></table></div></div>
      </section>

      <section id='categoriesView' class='view'>
        <div class='toolbar'><div></div><button class='primary-btn' id='addCategoryBtn'>新增分类</button></div>
        <div class='table-card'><div class='table-wrap'><table><thead><tr><th>分类</th><th>图标</th><th>颜色</th><th>排序</th><th>状态</th><th>操作</th></tr></thead><tbody id='categoriesTable'></tbody></table></div></div>
      </section>

      <section id='ordersView' class='view'>
        <div class='toolbar'><input id='orderSearch' placeholder='搜索订单号、商品或联系方式'><select id='orderStatusFilter'><option value=''>全部状态</option><option value='pending_payment'>待支付</option><option value='pending_verification'>待核验</option><option value='paid'>已支付</option><option value='completed'>已完成</option><option value='cancelled'>已取消</option></select><button id='refreshOrders'>刷新</button></div>
        <div class='table-card'><div class='table-wrap'><table><thead><tr><th>订单</th><th>用户</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id='ordersTable'></tbody></table></div></div>
      </section>

      <section id='rechargesView' class='view'>
        <div class='toolbar'><input id='rechargeSearch' placeholder='搜索充值单号或邮箱'><select id='rechargeStatusFilter'><option value=''>全部状态</option><option value='pending'>待支付</option><option value='pending_verification'>待核验</option><option value='paid'>已到账</option><option value='failed'>失败</option></select><button id='refreshRecharges'>刷新</button></div>
        <div class='table-card'><div class='table-wrap'><table><thead><tr><th>充值单</th><th>用户</th><th>金额</th><th>状态</th><th>交易信息</th><th>操作</th></tr></thead><tbody id='rechargesTable'></tbody></table></div></div>
      </section>

      <section id='usersView' class='view'>
        <div class='toolbar'><input id='userSearch' placeholder='搜索用户邮箱'><button id='refreshUsers'>刷新</button></div>
        <div class='table-card'><div class='table-wrap'><table><thead><tr><th>用户</th><th>余额</th><th>注册时间</th><th>权限</th><th>操作</th></tr></thead><tbody id='usersTable'></tbody></table></div></div>
      </section>
    </main>
  </div>

  <div id='adminModalBackdrop' class='modal-backdrop hidden'>
    <div class='modal-card'><button class='modal-close' id='adminModalClose'>×</button><div id='adminModalContent'></div></div>
  </div>
  <div id='toast' class='toast hidden'></div>

  <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
  <script>
    window.SUPABASE_URL = 'https://flyksqchtapkholfbgzj.supabase.co'
    window.SUPABASE_KEY = 'sb_publishable_r5sXWYRYSh1-U6VRATcHDQ_7c8yvpw0'
  </script>
  <script src='admin.js?v=1'></script>
</body>
</html>
